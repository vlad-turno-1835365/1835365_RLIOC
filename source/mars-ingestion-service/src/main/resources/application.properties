# Mars IoT Tester Application Properties

# Server Configuration
server.port=8081

# Mars Simulator Configuration
mars.simulator.url=http://mars-simulator:8080

# Kafka Configuration
spring.kafka.bootstrap-servers=kafka:9092

# Mars-specific Kafka Settings
mars.kafka.topic.mars-events=mars-telemetry-events
mars.kafka.producer.enabled=true

# Kafka Producer Performance Settings
mars.kafka.producer.acks=all
mars.kafka.producer.retries=3
mars.kafka.producer.batch-size=16384
mars.kafka.producer.linger-ms=1
mars.kafka.producer.buffer-memory=33554432
mars.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
mars.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Logging Configuration
logging.level.com.mars.tester=INFO
logging.level.org.apache.kafka=ERROR
logging.level.org.springframework.kafka=ERROR
logging.level.org.apache.kafka.clients.NetworkClient=ERROR

# Application Configuration
spring.application.name=mars-tester
management.endpoints.web.exposure.include=health,info
