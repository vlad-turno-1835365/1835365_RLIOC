services:
  mars-simulator:
    image: mars-iot-simulator:multiarch_v1
    ports:
      - "8080:8080"
    container_name: mars-simulator

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_BALANCER_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_started

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: ruok,srvr
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr"
    container_name: zookeeper
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc 127.0.0.1 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  mars-ingestion-service:
    build: ./mars-ingestion-service
    ports:
      - "8081:8081"
    depends_on:
      - mars-simulator
      - kafka
    container_name: mars-ingestion-service
    environment:
      - MARS_SIMULATOR_URL=http://mars-simulator:8080
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    container_name: redis

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: marsuser
      POSTGRES_PASSWORD: marspassword
      POSTGRES_DB: marsdb
    ports:
      - "5432:5432"
    container_name: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mars_db_manager:
    build: ./mars_db_manager
    ports:
      - "8002:8000"
    depends_on:
      - postgres
    container_name: mars_db_manager
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=marsuser
      - DB_PASSWORD=marspassword
      - DB_NAME=marsdb

  mars_memory_cache:
    build: ./mars_memory_cache
    ports:
      - "8003:8000"
    depends_on:
      - redis
    container_name: mars_memory_cache
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  mars_api_gateway:
    build: ./mars_api_gateway
    ports:
      - "8000:8000"
    depends_on:
      - mars_memory_cache
      - mars_db_manager
    container_name: mars_api_gateway
    environment:
      - MEMORY_CACHE_URL=http://mars_memory_cache:8000
      - DB_MANAGER_URL=http://mars_db_manager:8000

  mars_message_consumer:
    build: ./mars_message_consumer
    depends_on:
      - kafka
      - mars_db_manager
      - mars_memory_cache
      - mars_api_gateway
    container_name: mars_message_consumer
    environment:
      - KAFKA_BROKER=kafka:29092
      - KAFKA_TOPIC=mars-telemetry-events
      - KAFKA_GROUP_ID=mars_consumer_group
      - DB_MANAGER_URL=http://mars_db_manager:8000
      - MEMORY_CACHE_URL=http://mars_memory_cache:8000
      - API_GATEWAY_URL=http://mars_api_gateway:8000

  mars-frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    container_name: mars-frontend
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

volumes:
  postgres_data: